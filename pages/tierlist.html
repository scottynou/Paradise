<!doctype html>
<html lang="fr" data-theme-kind="brand" data-theme="paradise">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="256x256" href="../assets/img/logo/favicon.png" />
  <link rel="apple-touch-icon" href="../assets/img/logo/apple-touch-icon.png" />
  <title>Redirection | Paradise</title>
  <meta http-equiv="refresh" content="0; url=../index.html" />
  <link rel="canonical" href="../index.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/base.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--theme-text-main);
      font-family: var(--theme-font-body);
      background:
        radial-gradient(circle at 18% 14%, var(--theme-glow-primary), transparent 26%),
        radial-gradient(circle at 82% 16%, var(--theme-glow-secondary), transparent 24%),
        linear-gradient(180deg, var(--theme-bg-alt), var(--theme-bg-main));
    }

    main {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--theme-border-soft);
      border-radius: 28px;
      background:
        linear-gradient(180deg, var(--theme-card-highlight), rgba(255, 255, 255, 0.02)),
        var(--theme-surface);
      box-shadow: var(--theme-shadow);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: var(--theme-font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 0.98;
    }

    p {
      margin: 14px 0 0;
      color: var(--theme-text-muted);
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-top: 18px;
      padding: 0 18px;
      border: 1px solid var(--theme-border-soft);
      border-radius: 999px;
      color: var(--theme-text-main);
      text-decoration: none;
      background: var(--theme-button-primary-bg);
    }
  </style>
</head>
<body>
  <main>
    <h1>Paradise</h1>
    <p>La tier list centrale est maintenant sur la page d'accueil.</p>
    <a href="../index.html">Retour a l'accueil</a>
  </main>
</body>
</html>
